name: ci/cd-pipeline
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
permissions:
  id-token: write
  contents: read
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: 599476212737.dkr.ecr.ap-south-1.amazonaws.com
jobs:
  build-and-push:
    name: push and build the image to ecr
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: events-api
            context: ./apps/events-api
          - name: bookings-worker
            context: ./apps/bookings-worker
          - name: dashboard
            context: ./apps/dashboard
          - name: admin-api
            context: ./apps/admin-api 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: login to aws 
        uses: aws-actions/amazon-ecr-login@v2
      - name: set image tag
        id:  tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
      - name: build docker image 
        run: |
          docker build \
          -t ${{ env.ECR_REGISTRY }}/ticketops-dev-${{ matrix.service.name }}:${{ steps.tag.outputs.IMAGE_TAG }} \
          -t ${{ env.ECR_REGISTRY }}/ticketops-dev-${{ matrix.service.name }}:latest \
           ${{ matrix.service.context }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/ticketops-dev-${{ matrix.service.name }}:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
      - name: Push to ECR
        run: |
            docker push ${{ env.ECR_REGISTRY }}/ticketops-dev-${{ matrix.service.name }}:${{ steps.tag.outputs.IMAGE_TAG }}
            docker push  ${{ env.ECR_REGISTRY }}/ticketops-dev-${{ matrix.service.name }}:latest
          
        